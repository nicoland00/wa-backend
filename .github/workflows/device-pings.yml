name: Capture device pings

# Free alternative to Vercel Pro cron: GitHub Actions calls the capture
# endpoint on a schedule so device_pings accumulates the reporting history.
#
# Optional hardening: set repo secret CRON_SECRET (same value in Vercel env)
# to lock the endpoint. Set APP_BASE_URL to override the default domain.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Call capture endpoint
        run: |
          BASE="${{ secrets.APP_BASE_URL }}"
          if [ -z "$BASE" ]; then BASE="https://collateral.pastora.io"; fi
          URL="$BASE/api/cron/device-pings"

          if [ -n "${{ secrets.CRON_SECRET }}" ]; then
            AUTH=(-H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          else
            AUTH=()
          fi

          echo "Calling $URL"
          # Capture status + body + final URL (to reveal redirects)
          code=$(curl -sS -L -o /tmp/resp.txt -w "%{http_code}" -D /tmp/headers.txt "${AUTH[@]}" "$URL" || echo "000")
          final=$(curl -sS -o /dev/null -w "%{url_effective}" -L "${AUTH[@]}" "$URL" 2>/dev/null || echo "?")

          {
            echo "## Device pings capture"
            echo ""
            echo "- URL: \`$URL\`"
            echo "- Final URL after redirects: \`$final\`"
            echo "- HTTP status: **$code**"
            echo "- CRON_SECRET set: ${{ secrets.CRON_SECRET != '' }}"
            echo ""
            echo "### Response body"
            echo '```json'
            head -c 4000 /tmp/resp.txt 2>/dev/null || echo "(empty)"
            echo ""
            echo '```'
            echo "### Response headers"
            echo '```'
            head -c 1500 /tmp/headers.txt 2>/dev/null || echo "(none)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "HTTP $code"
          cat /tmp/resp.txt || true
          echo

          # Do not hard-fail: we want the summary readable. Flag non-200 in logs only.
          if [ "$code" != "200" ]; then
            echo "::warning::Capture returned HTTP $code (see run summary for body)"
          fi
